        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: calc(100vh * 581 / 423);
            max-height: calc(100vw * 423 / 581);
            overflow: hidden;
        }

        /* 결과 카드 래퍼 */
        #resultCardWrapper {
            -webkit-perspective: 100vmin;
            perspective: 100vmin;
            width: 41%;
            height: 67%;
            position: absolute;
            right: 9%;
            top: 33%;
            z-index: 50;
            container-type: size;
        }

        /* 결과 카드 */
        #resultCard {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
            -webkit-backface-visibility: visible;
            backface-visibility: visible;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Safari 초기값 명시 */
            -webkit-transform: rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05);
            transform: rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05);
            opacity: 0;
            /* 하드웨어 가속 강제 */
            will-change: transform, opacity;
            -webkit-transform-origin: center center;
            transform-origin: center center;
        }

        /* 카드 결과 텍스트 */
        .card-result {
            font-size: 18cqw;
            font-weight: bold;
            color: #4FC3F7;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
            padding: 2%;
            max-width: 90%;
            text-shadow: 1.5cqw 1.5cqw 0px rgba(0, 51, 102, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-result.show {
            opacity: 1;
        }

        /* 결과 카드 등장 애니메이션 */
        @-webkit-keyframes cardAppear {
            0% {
                -webkit-transform: rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05);
                transform: rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05);
                opacity: 0;
            }
            20% {
                -webkit-transform: rotateY(-270deg) rotateX(-15deg) rotateZ(-8deg) scale(0.2);
                transform: rotateY(-270deg) rotateX(-15deg) rotateZ(-8deg) scale(0.2);
                opacity: 0.4;
            }
            50% {
                -webkit-transform: rotateY(-630deg) rotateX(-10deg) rotateZ(-6deg) scale(0.5);
                transform: rotateY(-630deg) rotateX(-10deg) rotateZ(-6deg) scale(0.5);
                opacity: 0.6;
            }
            80% {
                -webkit-transform: rotateY(-990deg) rotateX(-5deg) rotateZ(-3deg) scale(0.85);
                transform: rotateY(-990deg) rotateX(-5deg) rotateZ(-3deg) scale(0.85);
                opacity: 0.85;
            }
            95% {
                -webkit-transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(0.99);
                transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(0.99);
                opacity: 0.98;
            }
            100% {
                -webkit-transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(1);
                transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes cardAppear {
            0% {
                -webkit-transform: rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05);
                transform: rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05);
                opacity: 0;
            }
            20% {
                -webkit-transform: rotateY(-270deg) rotateX(-15deg) rotateZ(-8deg) scale(0.2);
                transform: rotateY(-270deg) rotateX(-15deg) rotateZ(-8deg) scale(0.2);
                opacity: 0.4;
            }
            50% {
                -webkit-transform: rotateY(-630deg) rotateX(-10deg) rotateZ(-6deg) scale(0.5);
                transform: rotateY(-630deg) rotateX(-10deg) rotateZ(-6deg) scale(0.5);
                opacity: 0.6;
            }
            80% {
                -webkit-transform: rotateY(-990deg) rotateX(-5deg) rotateZ(-3deg) scale(0.85);
                transform: rotateY(-990deg) rotateX(-5deg) rotateZ(-3deg) scale(0.85);
                opacity: 0.85;
            }
            95% {
                -webkit-transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(0.99);
                transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(0.99);
                opacity: 0.98;
            }
            100% {
                -webkit-transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(1);
                transform: rotateY(-1080deg) rotateX(0deg) rotateZ(0deg) scale(1);
                opacity: 1;
            }
        }

        #resultCard.animate {
            -webkit-animation: cardAppear 2s ease-out forwards;
            animation: cardAppear 2s ease-out forwards;
        }

        /* Paper Units 컨테이너 */
        #paperUnitsContainer {
            position: absolute;
            top: 0.5%;
            left: 5%;
            right: 5%;
            display: flex;
            flex-direction: column;
            gap: 1%;
            z-index: 10;
        }

        .paper-row {
            display: flex;
            justify-content: flex-start;
            gap: 1.5%;
        }

        /* Paper Unit */
        .paper-unit {
            width: 8.5%;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            container-type: size;
        }

        .paper-unit .paper-text-wrapper {
            position: absolute;
            top: 41%;
            left: 0;
            width: 100%;
            height: 50%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
        }

        .paper-unit .paper-text {
            font-size: 25cqw;
            font-weight: bold;
            color: #8B0000;
            text-align: center;
            text-shadow: 2cqw 2cqw 2.5cqw rgba(255, 255, 255, 0.8);
            -webkit-transform: translateY(-80%);
            transform: translateY(-80%);
            opacity: 1;
            -webkit-transition: -webkit-transform 0.1s linear;
            transition: transform 0.1s linear;
            margin-left: 20%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* Safari 하드웨어 가속 */
            will-change: transform;
        }

        /* Star */
        .star {
            position: absolute;

        @keyframes starFade {
            0% {
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        @keyframes starRotate {
            0% {
                transform: scale(0.5) rotate(0deg);
            }
            30% {
                transform: scale(1) rotate(-27deg);
            }
            100% {
                transform: scale(1) rotate(-90deg);
            }
        }

        /* 컨트롤 버튼 */
        #controls {
            position: absolute;
            bottom: 2%;
            left: 2%;
            text-align: center;
            z-index: 100;
        }

        button {
            padding: 1.5vmin 3vmin;
            margin: 0 1vmin;
            font-size: 2vmin;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 1vmin;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        button:active {
            transform: scale(0.95);
        }

        /* 리셋 버튼 - 빨간색 */
        button.reset-button {
            background-color: #f44336;
        }

        button.reset-button:hover {
            background-color: #da190b;
        }

        /* 닫기 버튼 - 회색 */
        button.close-button {
            background-color: #757575;
        }

        button.close-button:hover {
            background-color: #616161;
        }

        /* 전체화면 버튼 - Safe Area 적용 (우측 상단, Safe Area 있으면 왼쪽으로 이동) */
        #fullscreenBtn {
            position: fixed;
            top: max(1vh, env(safe-area-inset-top, 0px));
            right: max(1vw, env(safe-area-inset-right, 0px));
            width: 6vmin;
            height: 6vmin;
            background-color: rgba(0, 0, 0, 0.6);
            border: 0.3vmin solid rgba(255, 255, 255, 0.3);
            border-radius: 1vmin;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5vmin;
            color: white;
            transition: background-color 0.3s;
            backdrop-filter: blur(5px);
        }

        #fullscreenBtn:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        #fullscreenBtn:active {
            transform: scale(0.9);
        }

        /* 전체화면 시작 안내 오버레이 */
        #fullscreenOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 3vh;
        }

        #fullscreenOverlay.show {
            display: flex;
        }

        .overlay-text {
            color: white;
            font-size: 4vmin;
            text-align: center;
            padding: 0 5vw;
        }

        .overlay-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 2vmin;
            padding: 3vmin 6vmin;
            font-size: 4vmin;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .overlay-button:hover {
            background-color: #45a049;
        }

        .overlay-button:active {
            transform: scale(0.95);
        }

        /* 커스텀 알림 모달 */
        #customAlert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            z-index: 5000;
            justify-content: center;
            align-items: center;
        }

        #customAlert.show {
            display: flex;
        }

        .alert-box {
            background: white;
            border-radius: 3vmin;
            padding: 5vmin;
            max-width: 80vw;
            text-align: center;
        }

        .alert-message {
            font-size: 4vmin;
            color: #333;
            margin-bottom: 4vmin;
            white-space: pre-line;
        }

        .alert-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 2vmin;
            padding: 2vmin 5vmin;
            font-size: 3.5vmin;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .alert-button:hover {
            background-color: #45a049;
        }

        .alert-button:active {
            transform: scale(0.95);
        }

        .alert-buttons {
            display: flex;
            gap: 2vmin;
            justify-content: center;
        }

        .alert-button-secondary {
            background-color: #999;
        }

        .alert-button-secondary:hover {
            background-color: #777;
        }

        /* 명단 관리 모달 */
        #nameListModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #nameListModal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 2vmin;
            padding: 3vmin;
            width: 80vw;
            max-width: calc(80vh * 1.3);
            height: 80vh;
            max-height: calc(80vw / 1.3);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            font-size: 3vmin;
            font-weight: bold;
            margin-bottom: 2vmin;
            color: #333;
            flex-shrink: 0;
        }

        .textarea-container {
            display: flex;
            border: 0.3vmin solid #ddd;
            border-radius: 1vmin;
            overflow: hidden;
            background: white;
            flex: 1;
            min-height: 0;
        }

        .textarea-container:focus-within {
            border-color: #4CAF50;
        }

        .line-numbers {
            background: #f5f5f5;
            color: #999;
            padding: 2vmin 1.5vmin;
            text-align: right;
            font-size: 2vmin;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
            user-select: none;
            overflow-y: scroll;
            overflow-x: hidden;
            white-space: pre;
            min-width: 5vmin;
            border-right: 0.1vmin solid #ddd;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        .line-numbers::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .modal-textarea {
            flex: 1;
            padding: 2vmin;
            border: none;
            font-size: 2vmin;
            font-family: Arial, sans-serif;
            resize: none;
            line-height: 1.5;
            overflow-y: auto;
            min-height: 0;
        }

        .modal-textarea:focus {
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 1vmin;
            margin-top: 2vmin;
            justify-content: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .modal-buttons button {
            font-size: 2vmin;
            padding: 1.5vmin 2.5vmin;
            white-space: nowrap;
        }

        .modal-info {
            background: #e8f4f8;
            border-left: 0.5vmin solid #4CAF50;
            padding: 2vmin;
            margin-bottom: 2vmin;
            border-radius: 1vmin;
            font-size: 1.8vmin;
            line-height: 1.6;
            flex-shrink: 0;
        }

        /* 그룹 선택 영역 */
        .group-selector {
            background: #f9f9f9;
            border: 0.2vmin solid #ddd;
            border-radius: 1vmin;
            padding: 2vmin;
            margin-bottom: 2vmin;
            flex-shrink: 0;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 1vmin;
        }

        .group-actions {
            display: flex;
            gap: 1vmin;
            margin-top: 1vmin;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Paper Units -->
        <div id="paperUnitsContainer"></div>

        <!-- 결과 카드 -->
        <div id="resultCardWrapper">
            <div id="resultCard">
                <div class="card-result" id="cardResult"></div>
            </div>
        </div>

        <!-- Rabbit 버튼 -->
        <div id="rabbitButton" onclick="playResultCardAnimation()"></div>

        <!-- 컨트롤 버튼 -->
        <div id="controls">
            <button onclick="openNameListModal()">명단 관리</button>
            <button class="reset-button" onclick="reset()">리셋</button>
        </div>

        <!-- 전체화면 버튼 -->
        <div id="fullscreenBtn" onclick="toggleFullscreen()">⛶</div>
    </div>

    <!-- 커스텀 알림 모달 -->
    <div id="customAlert">
        <div class="alert-box">
            <div class="alert-message" id="alertMessage"></div>
            <div class="alert-buttons" id="alertButtons">
                <button class="alert-button" onclick="closeCustomAlert()">확인</button>
            </div>
        </div>
    </div>

    <!-- 커스텀 입력 모달 -->
    <div id="customPrompt" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8); z-index: 5001; flex-direction: column; justify-content: flex-start; align-items: center; overflow-y: auto; padding-top: 10vh;">
        <div class="alert-box">
            <div class="alert-message" id="promptMessage"></div>
            <input type="text" id="promptInput" onkeydown="handlePromptKeydown(event)" onfocus="this.scrollIntoView({ behavior: 'smooth', block: 'center' })" style="width: 100%; padding: 2vmin; font-size: 3vmin; border: 0.2vmin solid #ddd; border-radius: 1vmin; margin-bottom: 3vmin; box-sizing: border-box;">
            <div class="alert-buttons">
                <button class="alert-button" onclick="handlePromptConfirm()">확인</button>
                <button class="alert-button alert-button-secondary" onclick="closeCustomPrompt()">취소</button>
            </div>
        </div>
    </div>

    <!-- 전체화면 시작 안내 오버레이 -->
    <div id="fullscreenOverlay">
        <div class="overlay-text">
            🎯 랜덤뽑기<br>
            전체화면 가로 모드로 시작하시겠습니까?
        </div>
        <button class="overlay-button" onclick="startFullscreen()">전체화면으로 시작</button>
        <button class="overlay-button" onclick="closeOverlay()" style="background-color: #666;">건너뛰기</button>
    </div>

    <!-- 명단 관리 모달 -->
    <div id="nameListModal">
        <div class="modal-content">
            <div class="modal-header">명단 관리</div>

            <!-- 그룹 선택 영역 -->
            <div class="group-selector">
                <div class="group-header">
                    <label style="font-size: 2.2vmin; font-weight: bold; color: #333;">📂 그룹 선택:</label>
                    <select id="groupSelect" onchange="switchGroup()" style="flex: 1; padding: 1vmin; font-size: 2vmin; border: 0.2vmin solid #ddd; border-radius: 0.5vmin; margin: 0 1vmin;">
                        <option value="">그룹을 선택하세요</option>
                    </select>
                    <button onclick="createNewGroup()" style="padding: 1vmin 2vmin; font-size: 2vmin; white-space: nowrap;">➕ 새 그룹</button>
                </div>
                <div class="group-actions" style="display: flex; gap: 1vmin; margin-top: 1vmin;">
                    <button onclick="renameCurrentGroup()" style="padding: 1vmin 2vmin; font-size: 1.8vmin; background-color: #FF9800;">✏️ 이름 변경</button>
                    <button onclick="deleteCurrentGroup()" style="padding: 1vmin 2vmin; font-size: 1.8vmin; background-color: #f44336;">🗑️ 그룹 삭제</button>
                </div>
            </div>

            <div class="modal-info">
                <strong>📝 명단 입력 규칙:</strong><br>
                • 한 줄에 하나씩 입력 (최대 40명)<br>
                • 빈 줄은 자동으로 무시됩니다<br>
                • 저장 버튼을 누르면 자동 저장됩니다
            </div>
            <div class="textarea-container">
                <div class="line-numbers" id="lineNumbers">1</div>
                <textarea id="nameListTextarea" class="modal-textarea" onfocus="handleTextareaFocus()" placeholder="명단을 입력하세요 (한 줄에 하나씩)&#10;예시:&#10;김철수&#10;이영희&#10;박민수"></textarea>
            </div>
            <div class="modal-buttons">
                <button onclick="saveNameList()">💾 저장</button>
                <button onclick="document.getElementById('fileInput').click()">📁 파일 불러오기</button>
                <button onclick="pasteFromClipboard()">📋 붙여넣기</button>
                <button class="reset-button" onclick="resetNameList()">🗑️ 명단 비우기</button>
                <button class="close-button" onclick="closeNameListModal()">닫기</button>
            </div>
            <input type="file" id="fileInput" style="display: none;" accept=".txt,.csv" onchange="loadNameListFile(event)">
        </div>
    </div>
        </div>
    </div>

        // 모든 이미지 로드 완료 확인
        let imagesLoaded = 0;
        const totalImages = cardImages.length + paperImages.length + 3; // +3: star, rabbit x2

        function checkAllImagesLoaded() {
            imagesLoaded++;
            console.log(`Images loaded: ${imagesLoaded}/${totalImages}`);
            if (imagesLoaded === totalImages) {
                console.log('All images loaded!');
            }
        }

        cardImages.forEach(img => img.onload = checkAllImagesLoaded);
        paperImages.forEach(img => img.onload = checkAllImagesLoaded);
        starImage.onload = checkAllImagesLoaded;
        rabbitButtonNormal.onload = checkAllImagesLoaded;
        rabbitButtonPush.onload = checkAllImagesLoaded;

        // Star 연속 생성
        const gameContainer = document.getElementById('gameContainer');
        let starInterval = null;

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';

            // 랜덤 위치 (상단 절반 영역, % 기준)
            const randomX = Math.random() * 85 + 5; // 5% ~ 90%
            const randomY = Math.random() * 40 + 5; // 5% ~ 45% (상단 절반)

            star.style.left = randomX + '%';
            star.style.top = randomY + '%';

            // 랜덤 크기 (1~2배) - 기본 5% 기준
            const randomScale = 1 + Math.random();
            star.style.width = (5 * randomScale) + '%';

            // 랜덤 애니메이션 지속 시간 (1.5초 ~ 2.5초)
            const duration = 1.5 + Math.random();
            star.style.animation = `starFade ${duration}s ease-in-out forwards, starRotate ${duration}s linear forwards`;

            gameContainer.appendChild(star);

            // 애니메이션 종료 후 제거
            setTimeout(() => {
                if (star.parentNode) {
                    star.remove();
                }
            }, duration * 1000);
        }

        // 랜덤 간격 생성 (가중치 적용)
        function getRandomStarInterval() {
            // 0.5초: 10%, 1초: 20%, 1.5초: 30%, 2초: 30%, 2.5초: 10%
            const intervals = [0.5, 1, 1, 1.5, 1.5, 1.5, 2, 2, 2, 2.5];
            const randomInterval = intervals[Math.floor(Math.random() * intervals.length)];
            return randomInterval * 1000; // 밀리초로 변환
        }

        // 별 연속 생성 시작
        function startStarAnimation() {
            if (starInterval) return;

            function scheduleNextStar() {
                createStar();
                const nextInterval = getRandomStarInterval();
                starInterval = setTimeout(scheduleNextStar, nextInterval);
            }

            scheduleNextStar();
        }

        // 별 연속 생성 중지
        function stopStarAnimation() {
            if (starInterval) {
                clearTimeout(starInterval);
                starInterval = null;
            }
        }

        // Paper Units 관리
        const paperUnitsContainer = document.getElementById('paperUnitsContainer');
        let paperUnits = [];
        let drawnIndices = []; // 뽑은 인덱스 목록

        // Paper Units 생성
        function createPaperUnits() {
            // 기존 units 제거
            paperUnitsContainer.innerHTML = '';
            paperUnits = [];

            const totalCount = names.length;
            if (totalCount === 0) return;

            let unitIndex = 0;

            // 3줄은 10개씩, 나머지 2줄은 5개씩
            const rowSizes = [10, 10, 10, 5, 5];

            for (let r = 0; r < rowSizes.length; r++) {
                if (unitIndex >= totalCount) break;

                const row = document.createElement('div');
                row.className = 'paper-row';

                const currentRowSize = Math.min(rowSizes[r], totalCount - unitIndex);

                for (let i = 0; i < currentRowSize; i++) {
                    createPaperUnit(row, unitIndex);
                    unitIndex++;
                }

                paperUnitsContainer.appendChild(row);
            }
        }

        // Paper Unit 생성 (단일)
        function createPaperUnit(row, unitIndex) {
            const unit = document.createElement('div');
            unit.className = 'paper-unit';

            const paper = document.createElement('div');
            paper.className = 'paper';

            const textWrapper = document.createElement('div');
            textWrapper.className = 'paper-text-wrapper';

            const text = document.createElement('div');
            text.className = 'paper-text';

            // Paper에는 이름만 표시
            const currentName = names[unitIndex];
            text.textContent = currentName;

            textWrapper.appendChild(text);
            unit.appendChild(paper);
            unit.appendChild(textWrapper);
            row.appendChild(unit);

            paperUnits.push({
                element: unit,
                paper: paper,
                text: text,
                currentFrame: 1,
                interval: null,
                isPlaying: false,
                index: unitIndex,
                originalText: currentName
            });
        }

        // Paper Unit 애니메이션 재생
        function playPaperAnimation(unitIndex, name) {
            const unit = paperUnits[unitIndex];
            if (unit.isPlaying) return;

            // 이름 설정
            unit.text.textContent = name;

            unit.isPlaying = true;
            unit.currentFrame = 1;
            updatePaperFrame(unitIndex, unit.currentFrame);

            unit.interval = setInterval(() => {
                unit.currentFrame++;
                if (unit.currentFrame > 10) {
                    clearInterval(unit.interval);
                    unit.interval = null;
                    unit.isPlaying = false;
                    return;
                }
                updatePaperFrame(unitIndex, unit.currentFrame);
            }, 100);
        }

        // Paper Unit 프레임 업데이트
        function updatePaperFrame(unitIndex, frameNumber) {
            const unit = paperUnits[unitIndex];

            // 프리로드된 이미지 사용 (Safari 호환성)
            if (frameNumber >= 1 && frameNumber <= 10) {
                const preloadedImg = paperImages[frameNumber - 1];
                if (preloadedImg && preloadedImg.complete) {
                    unit.paper.style.backgroundImage = `url('${preloadedImg.src}')`;
                } else {
                    // Fallback
                    const frameStr = String(frameNumber).padStart(2, '0');
                    unit.paper.style.backgroundImage = `url('images/paper/paper_${frameStr}.png')`;
                }
            }

            // Safari 강제 리페인트
            unit.paper.style.display = 'none';
            void unit.paper.offsetHeight; // 강제 리플로우
            unit.paper.style.display = '';

            // 텍스트 애니메이션 (리니어)
            const progress = (frameNumber - 1) / 9;
            const yPos = -80 + (progress * 90);
            unit.text.style.transform = `translateY(${yPos}%)`;
            unit.text.style.webkitTransform = `translateY(${yPos}%)`;
        }

        // 테스트 애니메이션
        function testPaperAnimation() {
            // 랜덤 유닛 선택
            const randomIndex = Math.floor(Math.random() * paperUnits.length);
            const randomName = names[Math.floor(Math.random() * names.length)];
            playPaperAnimation(randomIndex, randomName);
        }

        // 결과 카드 애니메이션 재생
        function playResultCardAnimation() {
            // 애니메이션 진행 중이면 무시
            if (isAnimating) return;

            // 명단이 없는 경우
            if (names.length === 0) {
                showAlert('⚠️ 명단이 비어있습니다!\n명단 관리 버튼을 눌러 명단을 입력해주세요.');
                return;
            }

            // 남은 인덱스 확인
            const remainingIndices = [];
            for (let i = 0; i < names.length; i++) {
                if (!drawnIndices.includes(i)) {
                    remainingIndices.push(i);
                }
            }

            if (remainingIndices.length === 0) {
                showAlert('⚠️ 모든 추첨이 완료되었습니다!\n리셋 버튼을 눌러 다시 시작하세요.');
                return;
            }

            // Click 사운드 재생
            clickSound.currentTime = 0;
            clickSound.play();

            isAnimating = true; // 애니메이션 시작
            resetResultCard();

            // 0.5초 후 카드 애니메이션 시작
            setTimeout(() => {
                // 랜덤 카드 이미지 선택 (Card1 ~ Card6)
                const randomCardNum = Math.floor(Math.random() * 6) + 1;

                // 프리로드된 이미지 사용 (Safari 호환성)
                const preloadedCardImg = cardImages[randomCardNum - 1];
                if (preloadedCardImg && preloadedCardImg.complete) {
                    resultCard.style.backgroundImage = `url('${preloadedCardImg.src}')`;
                    console.log('Using preloaded card:', preloadedCardImg.src);
                } else {
                    // Fallback
                    resultCard.style.backgroundImage = `url('images/Card${randomCardNum}.png')`;
                    console.log('Fallback card image');
                }

                // Safari 강제 리페인트
                resultCard.style.display = 'none';
                void resultCard.offsetHeight; // 강제 리플로우
                resultCard.style.display = 'flex';

                // 남은 인덱스 중에서 랜덤 선택
                const randomIndex = remainingIndices[Math.floor(Math.random() * remainingIndices.length)];
                const selectedName = names[randomIndex];

                // 중복 체크: 같은 이름이 여러 개 있는지 확인
                const sameNameIndices = [];
                for (let i = 0; i < names.length; i++) {
                    if (names[i] === selectedName) {
                        sameNameIndices.push(i);
                    }
                }

                // 표시할 텍스트 생성
                let displayText = selectedName;
                if (sameNameIndices.length > 1) {
                    // 중복이 있으면 명단에서의 번호 표시 (1-based)
                    displayText = `${selectedName} (${randomIndex + 1})`;
                }

                // 선택된 인덱스를 data attribute에 저장
                cardResult.textContent = displayText;
                cardResult.setAttribute('data-selected-index', randomIndex);
                cardResult.setAttribute('data-selected-name', selectedName);

                // 사운드 재생
                cardSound.currentTime = 0;
                cardSound.play();

                setTimeout(() => {
                    resultCard.classList.add('animate');
                }, 100);
            }, 500);
        }

        // 애니메이션 종료 이벤트 리스너 - 카드 애니메이션 끝나면 paper 애니메이션 시작
        function handleAnimationEnd() {
            cardResult.classList.add('show');

            // 이름 표시 시 pick 사운드 재생
            pickSound.currentTime = 0;
            pickSound.play();

            // 선택된 인덱스와 이름을 미리 저장
            const selectedIndex = parseInt(cardResult.getAttribute('data-selected-index'));
            const selectedName = cardResult.getAttribute('data-selected-name');

            // 뽑은 인덱스 즉시 추가 (중복 방지)
            if (!drawnIndices.includes(selectedIndex)) {
                drawnIndices.push(selectedIndex);
            }

            // pick 사운드 재생 완료 후 토끼 버튼 다시 활성화
            pickSound.onended = function() {
                isAnimating = false;
            };

            // 카드 애니메이션 끝나면 해당 인덱스의 paper 유닛에 애니메이션 실행
            paperAnimationTimeout = setTimeout(() => {
                if (selectedIndex !== -1 && selectedIndex < paperUnits.length) {
                    playPaperAnimation(selectedIndex, selectedName);
                }
                paperAnimationTimeout = null;
            }, 500);
        }

        // Safari 호환성을 위해 두 이벤트 모두 등록
        resultCard.addEventListener('animationend', handleAnimationEnd);
        resultCard.addEventListener('webkitAnimationEnd', handleAnimationEnd);

        // 결과 카드 리셋
        function resetResultCard() {
            resultCard.classList.remove('animate');
            const initialTransform = 'rotateY(90deg) rotateX(-20deg) rotateZ(-10deg) scale(0.05)';
            resultCard.style.webkitTransform = initialTransform;
            resultCard.style.transform = initialTransform;
            resultCard.style.opacity = '0';
            resultCard.style.backgroundImage = '';

            // 결과 텍스트 숨기기
            cardResult.classList.remove('show');
            cardResult.textContent = '';

            // 사운드 정지
            cardSound.pause();
            cardSound.currentTime = 0;
            pickSound.pause();
            pickSound.currentTime = 0;
        }

        // 전체 리셋
        function reset() {
            isAnimating = false; // 애니메이션 상태 초기화

            // 예약된 paper 애니메이션 취소
            if (paperAnimationTimeout) {
                clearTimeout(paperAnimationTimeout);
                paperAnimationTimeout = null;
            }

            resetResultCard();
            drawnIndices = []; // 뽑은 인덱스 초기화

            paperUnits.forEach((_, index) => {
                resetPaperUnit(index);
            });

            // 별 제거
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => star.remove());
        }

        // 명단 관리 함수 (그룹 지원)
        function loadNameListFromStorage() {
            const savedGroups = localStorage.getItem('randomChoiceGroups');
            const savedCurrentGroup = localStorage.getItem('randomChoiceCurrentGroup');

            if (savedGroups) {
                // 새로운 그룹 기반 데이터 로드
                try {
                    groups = JSON.parse(savedGroups);
                    currentGroupName = savedCurrentGroup || (groups.length > 0 ? groups[0].name : null);
                } catch (e) {
                    console.error('Failed to parse groups:', e);
                    groups = [];
                    currentGroupName = null;
                }
            } else {
                // 기존 데이터 마이그레이션 체크
                const oldSaved = localStorage.getItem('randomChoiceNameList');
                if (oldSaved) {
                    const oldNames = oldSaved.split('\n')
                        .map(name => name.trim())
                        .filter(name => name.length > 0);
                    groups = [{
                        name: "기본 그룹",
                        members: oldNames
                    }];
                    currentGroupName = "기본 그룹";
                    saveGroupsToStorage();
                    // 기존 데이터 삭제
                    localStorage.removeItem('randomChoiceNameList');
                } else {
                    // 완전히 새로운 사용자 - 기본 그룹 생성 (빈 명단)
                    groups = [{
                        name: "기본 그룹",
                        members: []
                    }];
                    currentGroupName = "기본 그룹";
                    saveGroupsToStorage();
                }
            }

            // 현재 그룹의 멤버를 names에 로드
            loadCurrentGroupMembers();
        }

        function loadCurrentGroupMembers() {
            const currentGroup = groups.find(g => g.name === currentGroupName);
            if (currentGroup) {
                names = [...currentGroup.members];
            } else if (groups.length > 0) {
                currentGroupName = groups[0].name;
                names = [...groups[0].members];
            } else {
                names = [];
            }
        }

        function saveGroupsToStorage() {
            localStorage.setItem('randomChoiceGroups', JSON.stringify(groups));
            localStorage.setItem('randomChoiceCurrentGroup', currentGroupName);
        }

        function saveNameListToStorage() {
            // 현재 그룹의 멤버 업데이트
            const currentGroup = groups.find(g => g.name === currentGroupName);
            if (currentGroup) {
                currentGroup.members = [...names];
                saveGroupsToStorage();
            }
        }

        // 그룹 관리 함수
        function updateGroupSelector() {
            const selector = document.getElementById('groupSelect');
            selector.innerHTML = '';

            groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group.name;
                option.textContent = group.name;
                if (group.name === currentGroupName) {
                    option.selected = true;
                }
                selector.appendChild(option);
            });
        }

        function switchGroup() {
            const selector = document.getElementById('groupSelect');
            const newGroupName = selector.value;

            if (newGroupName && newGroupName !== currentGroupName) {
                currentGroupName = newGroupName;
                loadCurrentGroupMembers();
                createPaperUnits();
                drawnIndices = []; // 그룹 변경 시 추첨 리셋
                saveGroupsToStorage();

                // 모달이 열려있으면 텍스트 영역 업데이트
                if (document.getElementById('nameListModal').classList.contains('show')) {
                    document.getElementById('nameListTextarea').value = names.join('\n');
                    updateLineNumbers();
                }

                showAlert(`✅ "${currentGroupName}" 그룹으로 변경되었습니다!`);
            }
        }

        function createNewGroup() {
            showPrompt('새 그룹 이름을 입력하세요:', '', function(groupName) {
                if (!groupName || !groupName.trim()) {
                    return;
                }

                const trimmedName = groupName.trim();

                // 중복 체크
                if (groups.some(g => g.name === trimmedName)) {
                    showAlert('⚠️ 이미 존재하는 그룹 이름입니다!');
                    return;
                }

                // 새 그룹 생성
                groups.push({
                    name: trimmedName,
                    members: []
                });

                currentGroupName = trimmedName;
                loadCurrentGroupMembers();
                createPaperUnits();
                drawnIndices = [];
                saveGroupsToStorage();
                updateGroupSelector();

                // 텍스트 영역 업데이트
                document.getElementById('nameListTextarea').value = '';
                updateLineNumbers();

                showAlert(`✅ "${trimmedName}" 그룹이 생성되었습니다!`);
            });
        }

        function renameCurrentGroup() {
            if (!currentGroupName) {
                showAlert('⚠️ 선택된 그룹이 없습니다!');
                return;
            }

            showPrompt(`"${currentGroupName}" 그룹의 새 이름을 입력하세요:`, currentGroupName, function(newName) {
                if (!newName || !newName.trim()) {
                    return;
                }

                const trimmedName = newName.trim();

                // 같은 이름이면 무시
                if (trimmedName === currentGroupName) {
                    return;
                }

                // 중복 체크
                if (groups.some(g => g.name === trimmedName)) {
                    showAlert('⚠️ 이미 존재하는 그룹 이름입니다!');
                    return;
                }

                // 이름 변경
                const currentGroup = groups.find(g => g.name === currentGroupName);
                if (currentGroup) {
                    currentGroup.name = trimmedName;
                    currentGroupName = trimmedName;
                    saveGroupsToStorage();
                    updateGroupSelector();
                    showAlert(`✅ 그룹 이름이 "${trimmedName}"으로 변경되었습니다!`);
                }
            });
        }

        function deleteCurrentGroup() {
            if (!currentGroupName) {
                showAlert('⚠️ 선택된 그룹이 없습니다!');
                return;
            }

            if (groups.length === 1) {
                showAlert('⚠️ 마지막 그룹은 삭제할 수 없습니다!\n최소 1개의 그룹이 필요합니다.');
                return;
            }

            showAlert(
                `⚠️ "${currentGroupName}" 그룹을 삭제하시겠습니까?\n그룹의 모든 명단이 삭제됩니다!`,
                function() {
                    // 삭제 확인
                    const index = groups.findIndex(g => g.name === currentGroupName);
                    if (index !== -1) {
                        groups.splice(index, 1);

                        // 다른 그룹으로 전환
                        currentGroupName = groups[0].name;
                        loadCurrentGroupMembers();
                        createPaperUnits();
                        drawnIndices = [];
                        saveGroupsToStorage();
                        updateGroupSelector();

                        // 텍스트 영역 업데이트
                        document.getElementById('nameListTextarea').value = names.join('\n');
                        updateLineNumbers();

                        showAlert(`✅ 그룹이 삭제되었습니다!`);
                    }
                },
                '삭제',
                '취소'
            );
        }

        // 줄 번호 업데이트
        function updateLineNumbers() {
            const textarea = document.getElementById('nameListTextarea');
            const lineNumbers = document.getElementById('lineNumbers');
            const lines = textarea.value.split('\n').length;

            let lineNumberText = '';
            for (let i = 1; i <= lines; i++) {
                lineNumberText += i + '\n';
            }
            lineNumbers.textContent = lineNumberText;
        }

        // 스크롤 동기화
        function syncScroll() {
            const textarea = document.getElementById('nameListTextarea');
            const lineNumbers = document.getElementById('lineNumbers');
            lineNumbers.scrollTop = textarea.scrollTop;
        }

        function openNameListModal() {
            updateGroupSelector();
            document.getElementById('nameListTextarea').value = names.join('\n');
            updateLineNumbers();
            document.getElementById('nameListModal').classList.add('show');
        }

        function closeNameListModal() {
            document.getElementById('nameListModal').classList.remove('show');
        }

        function saveNameList() {
            const text = document.getElementById('nameListTextarea').value;
            let tempNames = text.split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);

            if (tempNames.length > 40) {
                showAlert(
                    `⚠️ 명단은 최대 40명까지만 가능합니다!\n입력된 인원이 ${tempNames.length}명입니다.\n처음 40명만 저장하시겠습니까?`,
                    function() {
                        // 확인 버튼 클릭 시
                        names = tempNames.slice(0, 40);
                        saveNameListToStorage();
                        createPaperUnits();
                        drawnIndices = [];
                        closeNameListModal();
                        showAlert('✅ 명단이 저장되었습니다! (총 40명)');
                    },
                    '40명만 저장',
                    '다시 수정'
                );
                return;
            }

            names = tempNames;
            saveNameListToStorage();
            createPaperUnits(); // Paper Units 재생성
            drawnIndices = []; // 뽑은 인덱스 초기화
            closeNameListModal();

            if (names.length === 0) {
                showAlert('✅ 빈 명단이 저장되었습니다!');
            } else {
                showAlert(`✅ 명단이 저장되었습니다! (총 ${names.length}명)`);
            }
        }

        // 파일 불러오기
        function loadNameListFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const buffer = e.target.result;

                // 여러 인코딩 시도 (UTF-8, EUC-KR)
                let text = '';
                try {
                    // 먼저 UTF-8 시도
                    const decoder = new TextDecoder('utf-8', { fatal: true });
                    text = decoder.decode(buffer);
                } catch (error) {
                    // UTF-8 실패 시 EUC-KR 시도
                    try {
                        const decoder = new TextDecoder('euc-kr');
                        text = decoder.decode(buffer);
                    } catch (error2) {
                        // EUC-KR도 실패 시 CP949 시도
                        try {
                            const decoder = new TextDecoder('windows-949');
                            text = decoder.decode(buffer);
                        } catch (error3) {
                            // 모두 실패 시 기본 UTF-8로
                            const decoder = new TextDecoder('utf-8');
                            text = decoder.decode(buffer);
                        }
                    }
                }

                document.getElementById('nameListTextarea').value = text;
                updateLineNumbers();
            };
            reader.readAsArrayBuffer(file);

            // input 값 초기화 (같은 파일 다시 선택 가능하도록)
            event.target.value = '';
        }

        // 클립보드에서 붙여넣기
        async function pasteFromClipboard() {
            try {
                // Clipboard API를 사용하여 텍스트 읽기
                const text = await navigator.clipboard.readText();

                if (!text || !text.trim()) {
                    showAlert('⚠️ 클립보드가 비어있습니다!');
                    return;
                }

                // 현재 textarea 내용 확인
                const currentText = document.getElementById('nameListTextarea').value.trim();

                if (currentText) {
                    // 기존 내용이 있으면 선택 메뉴 표시
                    window.clipboardTempData = text; // 임시 저장
                    showClipboardOptions();
                } else {
                    // 기존 내용이 없으면 바로 붙여넣기
                    document.getElementById('nameListTextarea').value = text;
                    updateLineNumbers();
                    showAlert('✅ 클립보드 내용이 붙여넣기되었습니다!');
                }
            } catch (err) {
                console.error('Clipboard error:', err);
                if (err.name === 'NotAllowedError') {
                    showAlert('⚠️ 클립보드 접근 권한이 거부되었습니다.\n브라우저 설정에서 클립보드 권한을 허용해주세요.');
                } else {
                    showAlert('⚠️ 클립보드에서 붙여넣기 실패!\n수동으로 붙여넣기(Ctrl+V)를 사용해주세요.');
                }
            }
        }

        // 클립보드 옵션 표시
        function showClipboardOptions() {
            document.getElementById('alertMessage').textContent = '기존 명단이 있습니다.\n어떻게 하시겠습니까?';
            const buttonsContainer = document.getElementById('alertButtons');
            buttonsContainer.innerHTML = `
                <button class="alert-button" onclick="handleClipboardReplace()">전체 교체</button>
                <button class="alert-button" onclick="handleClipboardAppend()">기존 명단에 추가</button>
                <button class="alert-button alert-button-secondary" onclick="closeCustomAlert()">취소</button>
            `;
            document.getElementById('customAlert').classList.add('show');
        }

        // 클립보드 전체 교체
        function handleClipboardReplace() {
            closeCustomAlert();
            const text = window.clipboardTempData;
            if (text) {
                document.getElementById('nameListTextarea').value = text;
                updateLineNumbers();
                showAlert('✅ 명단이 교체되었습니다!');
                window.clipboardTempData = null;
            }
        }

        // 클립보드 추가
        function handleClipboardAppend() {
            closeCustomAlert();
            const text = window.clipboardTempData;
            if (text) {
                const currentText = document.getElementById('nameListTextarea').value.trim();
                const combined = currentText + '\n' + text;
                document.getElementById('nameListTextarea').value = combined;
                updateLineNumbers();
                showAlert('✅ 클립보드 내용이 추가되었습니다!');
                window.clipboardTempData = null;
            }
        }

        // 명단 비우기
        function resetNameList() {
            const currentText = document.getElementById('nameListTextarea').value.trim();

            if (!currentText) {
                showAlert('⚠️ 이미 명단이 비어있습니다!');
                return;
            }

            showAlert(
                '⚠️ 현재 명단을 모두 비우시겠습니까?\n비운 명단이 자동으로 저장됩니다!',
                function() {
                    document.getElementById('nameListTextarea').value = '';
                    updateLineNumbers();

                    // 빈 명단 저장
                    names = [];
                    saveNameListToStorage();
                    createPaperUnits();
                    drawnIndices = [];

                    showAlert('✅ 명단이 비워지고 저장되었습니다!');
                },
                '비우기',
                '취소'
            );
        }

        // 모달 외부 클릭 시 닫기 (제거 - 명단 입력 중 실수 방지)

        // 전체화면 토글
        async function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
                // 전체화면 진입
                const elem = document.documentElement;
                try {
                    if (elem.requestFullscreen) {
                        await elem.requestFullscreen();
                    } else if (elem.webkitRequestFullscreen) {
                        await elem.webkitRequestFullscreen();
                    } else if (elem.mozRequestFullScreen) {
                        await elem.mozRequestFullScreen();
                    } else if (elem.msRequestFullscreen) {
                        await elem.msRequestFullscreen();
                    }

                    // 전체화면 진입 후 가로 모드로 강제
                    if (screen.orientation && screen.orientation.lock) {
                        try {
                            await screen.orientation.lock('landscape');
                        } catch (err) {
                            console.log('Orientation lock failed:', err);
                        }
                    }
                } catch (err) {
                    console.log('Fullscreen failed:', err);
                }
            } else {
                // 전체화면 종료
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // 전체화면으로 시작
        async function startFullscreen() {
            const elem = document.documentElement;
            try {
                if (elem.requestFullscreen) {
                    await elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    await elem.webkitRequestFullscreen();
                } else if (elem.mozRequestFullScreen) {
                    await elem.mozRequestFullScreen();
                } else if (elem.msRequestFullscreen) {
                    await elem.msRequestFullscreen();
                }

                // 전체화면 진입 후 가로 모드로 강제
                if (screen.orientation && screen.orientation.lock) {
                    try {
                        await screen.orientation.lock('landscape');
                    } catch (err) {
                        console.log('Orientation lock failed:', err);
                    }
                }
            } catch (err) {
                console.log('Fullscreen failed:', err);
            }
            closeOverlay();
        }

        // 오버레이 닫기
        function closeOverlay() {
            document.getElementById('fullscreenOverlay').classList.remove('show');
        }

        // 커스텀 알림 함수
        function showAlert(message, confirmCallback = null, confirmText = '확인', cancelText = '취소') {
            document.getElementById('alertMessage').textContent = message;
            const buttonsContainer = document.getElementById('alertButtons');

            if (confirmCallback) {
                // 확인/취소 버튼 두 개
                buttonsContainer.innerHTML = `
                    <button class="alert-button" onclick="handleAlertConfirm()">${confirmText}</button>
                    <button class="alert-button alert-button-secondary" onclick="closeCustomAlert()">${cancelText}</button>
                `;
                window.currentAlertCallback = confirmCallback;
            } else {
                // 확인 버튼 하나만
                buttonsContainer.innerHTML = `
                    <button class="alert-button" onclick="closeCustomAlert()">확인</button>
                `;
                window.currentAlertCallback = null;
            }

            document.getElementById('customAlert').classList.add('show');
        }

        function handleAlertConfirm() {
            const callback = window.currentAlertCallback;
            closeCustomAlert();
            if (callback) {
                callback();
            }
        }

        function closeCustomAlert() {
            document.getElementById('customAlert').classList.remove('show');
            window.currentAlertCallback = null;
        }

        // 커스텀 입력 함수
        function showPrompt(message, defaultValue = '', callback) {
            document.getElementById('promptMessage').textContent = message;
            document.getElementById('promptInput').value = defaultValue;
            document.getElementById('customPrompt').style.display = 'flex';
            window.currentPromptCallback = callback;

            // 입력창에 포커스 (onfocus에서 자동 스크롤 처리)
            setTimeout(() => {
                const input = document.getElementById('promptInput');
                input.focus();
                input.select();
            }, 100);
        }

        function handlePromptConfirm() {
            const value = document.getElementById('promptInput').value;
            const callback = window.currentPromptCallback;
            closeCustomPrompt();
            if (callback) {
                callback(value);
            }
        }

        function closeCustomPrompt() {
            document.getElementById('customPrompt').style.display = 'none';
            window.currentPromptCallback = null;
        }

        function handlePromptKeydown(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handlePromptConfirm();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                closeCustomPrompt();
            }
        }

        // 명단 입력 textarea 포커스 시 스크롤
        function handleTextareaFocus() {
            // 키보드가 올라오는 시간을 고려하여 여러 번 스크롤 시도
            const textareaContainer = document.querySelector('.textarea-container');
            if (!textareaContainer) return;

            // 즉시 1차 스크롤
            textareaContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // 키보드 올라오는 동안 추가 스크롤 (300ms, 600ms)
            setTimeout(() => {
                textareaContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);

            setTimeout(() => {
                textareaContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 600);
        }

        // 스페이스 키 이벤트 리스너
        document.addEventListener('keydown', function(e) {
            // 스페이스 키 (keyCode 32 또는 key === ' ')
            if (e.key === ' ' || e.keyCode === 32) {
                // 모달이 열려있거나 input/textarea에 포커스가 있으면 무시
                if (document.getElementById('nameListModal').classList.contains('show') ||
                    document.getElementById('customAlert').classList.contains('show') ||
                    document.getElementById('customPrompt').style.display === 'flex' ||
                    document.getElementById('fullscreenOverlay').classList.contains('show') ||
                    e.target.tagName === 'INPUT' ||
                    e.target.tagName === 'TEXTAREA' ||
                    e.target.tagName === 'BUTTON' ||
                    e.target.tagName === 'SELECT') {
                    return;
                }

                // 기본 동작(스크롤) 방지
                e.preventDefault();

                // 토끼 버튼 클릭과 동일하게 동작
                playResultCardAnimation();
            }
        });

        // 페이지 로드 시 오버레이 표시
        window.addEventListener('load', function() {
            // localStorage에 저장된 설정 확인
            const skipFullscreenPrompt = localStorage.getItem('skipFullscreenPrompt');
            if (!skipFullscreenPrompt) {
                document.getElementById('fullscreenOverlay').classList.add('show');
            }
        });

        // textarea 이벤트 리스너 설정
        const textarea = document.getElementById('nameListTextarea');
        textarea.addEventListener('input', updateLineNumbers);
        textarea.addEventListener('scroll', syncScroll);

        // 초기 상태 설정
        loadNameListFromStorage();
        createPaperUnits(); // Paper Units 생성
        reset();

        // 별 애니메이션 자동 시작
        startStarAnimation();
    </script>
</body>
</html>
